<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHCDP | Cloud Medical Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Required Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-white font-sans antialiased overflow-hidden">

    <!-- LOGIN SCREEN (PASSCODE: 123456) -->
    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-[#020617] px-4">
        <div class="bg-blue-900/20 p-10 rounded-[3rem] shadow-2xl w-full max-w-md border border-blue-800/50 backdrop-blur-3xl text-center">
            <div class="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-500/20 rotate-3">
                <i data-lucide="lock" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-black mb-8 uppercase tracking-[0.4em]">CHCDP LOGIN</h1>
            <input type="password" id="login-pass" class="w-full px-5 py-5 rounded-2xl bg-black/40 border border-blue-800 text-white text-center text-3xl tracking-[0.5em] outline-none focus:border-blue-500 mb-6 transition-all" placeholder="••••">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-500 transition-all shadow-2xl uppercase tracking-widest active:scale-95">Access System</button>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="app-content" class="hidden h-screen flex overflow-hidden">
        
        <!-- SIDEBAR (Minimized icons only, expands on hover) -->
        <aside id="sidebar" class="w-20 hover:w-64 bg-blue-950 border-r border-blue-900/50 flex flex-col transition-all duration-300 ease-in-out z-50 group no-print">
            <div class="h-24 flex items-center px-6">
                <div class="min-w-[32px] h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i data-lucide="activity" class="text-white w-5 h-5"></i>
                </div>
                <span class="sidebar-text ml-4 font-black text-xl tracking-tighter transition-all duration-300 whitespace-nowrap uppercase">CHCDP<span class="text-blue-500">PRO</span></span>
            </div>
            
            <nav class="flex-1 px-4 space-y-4 pt-4">
                <button onclick="switchTab('dashboard')" class="nav-btn active" id="tab-dashboard">
                    <i data-lucide="search"></i><span class="sidebar-text">Dashboard</span>
                </button>
                <button onclick="switchTab('entry')" class="nav-btn" id="tab-entry">
                    <i data-lucide="user-plus"></i><span class="sidebar-text">New Entry</span>
                </button>
                <button onclick="switchTab('settings')" class="nav-btn" id="tab-settings">
                    <i data-lucide="settings"></i><span class="sidebar-text">Settings</span>
                </button>
            </nav>

            <div class="p-4 border-t border-blue-900/50">
                <button onclick="handleLogout()" class="nav-btn text-red-500 hover:bg-red-500/10">
                    <i data-lucide="power"></i><span class="sidebar-text">Logout</span>
                </button>
            </div>
        </aside>

        <!-- CONTENT VIEWPORT -->
        <main class="flex-1 flex flex-col bg-[#020617] relative overflow-hidden">
            
            <!-- VIEW: DASHBOARD (SEARCH ONLY STARTUP) -->
            <div id="view-dashboard" class="view-panel flex flex-col items-center justify-center p-6">
                <div class="w-full max-w-2xl text-center space-y-12">
                    <div class="space-y-2">
                        <h2 class="text-7xl font-black tracking-tighter uppercase text-white/5 select-none">Registry</h2>
                        <p class="text-blue-500 font-bold tracking-[0.6em] uppercase text-[10px]">Cloud Database Search</p>
                    </div>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 text-blue-500 w-6 h-6"></i>
                        <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search Name or Case Number..." class="w-full pl-16 pr-6 py-7 bg-blue-900/10 border-2 border-blue-800/40 rounded-[2.5rem] text-2xl text-white outline-none focus:border-blue-500 focus:bg-blue-900/30 transition-all shadow-2xl">
                    </div>
                    <!-- LIVE SEARCH RESULTS -->
                    <div id="search-results" class="grid grid-cols-1 gap-3 text-left overflow-y-auto max-h-[40vh] custom-scroll pr-2"></div>
                </div>
            </div>

            <!-- VIEW: PATIENT FORM (ENTRY) -->
            <div id="view-entry" class="view-panel hidden overflow-y-auto p-4 lg:p-12 custom-scroll">
                <div class="max-w-5xl mx-auto bg-blue-950/40 rounded-[3rem] border border-blue-900/50 shadow-2xl" id="printable-record">
                    
                    <div class="p-8 border-b border-blue-900/50 flex justify-between items-center rounded-t-[3rem] bg-blue-900/10 no-print">
                        <h2 class="text-lg font-black uppercase tracking-widest flex items-center gap-3">
                            <i data-lucide="file-text" class="text-blue-500"></i><span id="form-title">Patient Case Record</span>
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="exportToPDF()" class="p-3 bg-blue-900 border border-blue-800 rounded-2xl text-blue-400 hover:bg-blue-800 transition"><i data-lucide="download" class="w-5 h-5"></i></button>
                            <button onclick="window.print()" class="p-3 bg-blue-900 border border-blue-800 rounded-2xl text-blue-400 hover:bg-blue-800 transition"><i data-lucide="printer" class="w-5 h-5"></i></button>
                        </div>
                    </div>

                    <div class="p-8 lg:p-12 space-y-10">
                        <!-- Identity & Photo -->
                        <div class="flex flex-col md:flex-row gap-10">
                            <div class="flex-1 space-y-6">
                                <div class="field-box">
                                    <label>Case Number</label>
                                    <input type="text" id="field-caseNumber" placeholder="CN-0000" class="blue-input text-2xl font-black text-blue-400 uppercase">
                                </div>
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="field-box"><label>First Name</label><input type="text" id="field-name" class="blue-input"></div>
                                    <div class="field-box"><label>Middle Name</label><input type="text" id="field-middleName" class="blue-input"></div>
                                    <div class="field-box"><label>Surname</label><input type="text" id="field-surname" class="blue-input"></div>
                                </div>
                            </div>
                            <div class="w-full md:w-48 no-print flex flex-col justify-end">
                                <div class="relative h-44 w-full bg-black border-2 border-dashed border-blue-900 rounded-[2rem] flex flex-col items-center justify-center overflow-hidden hover:border-blue-500 transition group">
                                    <img id="photo-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                                    <div id="photo-placeholder" class="text-center text-blue-900">
                                        <i data-lucide="camera" class="mx-auto mb-2 w-8 h-8"></i>
                                        <span class="text-[10px] font-black uppercase">Attach Photo</span>
                                    </div>
                                    <input type="file" id="field-photo" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handlePhoto(this)">
                                </div>
                            </div>
                        </div>

                        <!-- Address & Vitals -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-8 rounded-[2rem] bg-blue-900/10 border border-blue-900/30">
                            <div class="field-box md:col-span-2"><label>Full Address</label><input type="text" id="field-address" class="blue-input"></div>
                            <div class="field-box"><label>Bldg/Flat No</label><input type="text" id="field-building" class="blue-input"></div>
                            <div class="field-box"><label>Road</label><input type="text" id="field-road" class="blue-input"></div>
                            <div class="field-box"><label>Area</label><input type="text" id="field-area" class="blue-input"></div>
                            <div class="field-box"><label>City</label><input type="text" id="field-city" class="blue-input"></div>
                            <div class="field-box"><label>State</label><input type="text" id="field-state" class="blue-input"></div>
                            <div class="field-box"><label>Pin Code</label><input type="text" id="field-pinCode" class="blue-input"></div>
                            <div class="field-box"><label>Mobile No</label><input type="text" id="field-mobile" class="blue-input"></div>
                            <div class="field-box"><label>Email</label><input type="email" id="field-email" class="blue-input"></div>
                            <div class="field-box"><label>Age</label><input type="number" id="field-age" class="blue-input"></div>
                            <div class="field-box"><label>DOB</label><input type="date" id="field-dob" class="blue-input"></div>
                            <div class="field-box"><label>Blood Group</label>
                                <select id="field-bloodGroup" class="blue-input">
                                    <option value="">Select</option><option>A+</option><option>B+</option><option>O+</option><option>AB+</option><option>A-</option><option>B-</option><option>O-</option><option>AB-</option>
                                </select>
                            </div>
                        </div>

                        <!-- Symptom Table -->
                        <div class="space-y-6">
                            <div class="flex justify-between items-center px-4">
                                <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em]">Case Logs</h3>
                                <button onclick="addSymptomRow()" class="no-print bg-blue-600 text-white text-[10px] font-black px-6 py-2 rounded-xl">ADD ROW</button>
                            </div>
                            <div class="overflow-x-auto rounded-[2rem] border border-blue-900/50 bg-black/20">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-blue-950/50 text-blue-500 text-[10px] font-black uppercase">
                                        <tr>
                                            <th class="px-6 py-5 w-48">Date</th>
                                            <th class="px-6 py-5">Symptoms</th>
                                            <th class="px-6 py-5">Remedy 1</th>
                                            <th class="px-6 py-5">Remedy 2</th>
                                            <th class="px-6 py-5 no-print"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="symptom-body" class="divide-y divide-blue-900/30"></tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Footer Actions -->
                        <div class="flex flex-col md:flex-row gap-4 pt-10 no-print">
                            <button onclick="saveRecord()" class="flex-[2] bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-500 transition active:scale-[0.98] uppercase tracking-widest">Update Cloud Database</button>
                            <button id="delete-btn-form" onclick="deleteRecord(state.editingId)" class="hidden flex-1 bg-red-500/10 text-red-500 border border-red-500/20 font-black py-5 rounded-2xl hover:bg-red-500 hover:text-white transition uppercase text-[10px]">Delete Case</button>
                            <button onclick="resetForm()" class="flex-1 bg-blue-900/50 text-blue-400 font-black py-5 rounded-2xl uppercase text-[10px]">New Form</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: SETTINGS -->
            <div id="view-settings" class="view-panel hidden p-8 flex items-center justify-center">
                <div class="w-full max-w-sm bg-blue-950 p-10 rounded-[3rem] border border-blue-900/50 shadow-2xl text-center">
                    <h2 class="text-xl font-black mb-8 uppercase tracking-widest text-blue-500">System Config</h2>
                    <div class="space-y-6">
                        <div class="field-box text-left">
                            <label>New Access Passcode</label>
                            <input type="password" id="new-password" class="blue-input" placeholder="New digits">
                        </div>
                        <button onclick="updatePassword()" class="w-full bg-white text-blue-900 font-black py-4 rounded-xl uppercase tracking-widest">Update Password</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
