<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHCDB | Professional Medical Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#f9f7f2] text-[#4a443b] font-sans antialiased overflow-hidden">

    <!-- LOGIN OVERLAY -->
    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-[#f2ede4] px-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border border-[#e2d8c3] text-center">
            <div class="w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-lg rotate-3 overflow-hidden bg-[#f9f7f2]">
                <img src="logo.png" class="logo-sage w-16 h-16 object-contain" alt="Logo">
            </div>
            <h1 class="text-2xl font-bold mb-8 uppercase tracking-[0.4em] text-[#5e574d]">CHCDB System</h1>
            <input type="password" id="login-pass" class="w-full px-5 py-5 rounded-2xl bg-[#faf9f6] border border-[#dcd7c9] text-[#4a443b] text-center text-3xl tracking-[0.5em] outline-none focus:border-[#7c9082] mb-6 transition-all" placeholder="••••">
            <button onclick="handleLogin()" class="w-full bg-[#7c9082] text-white font-bold py-5 rounded-2xl hover:bg-[#6b7e71] transition shadow-xl uppercase tracking-widest active:scale-95">Access Clinic</button>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="app-content" class="hidden h-screen flex overflow-hidden">
        
        <!-- EXPANDABLE SIDEBAR -->
        <aside id="sidebar" class="w-20 hover:w-64 bg-white border-r border-[#e2d8c3] flex flex-col transition-all duration-300 ease-in-out z-50 group no-print shadow-xl">
            <div class="h-24 flex items-center px-6">
                <div class="min-w-[32px] h-8 flex items-center justify-center overflow-hidden">
                    <img src="logo.png" class="logo-sage w-7 h-7 object-contain" alt="Icon">
                </div>
                <span class="sidebar-text ml-4 font-black text-xl tracking-tighter transition-all duration-300 whitespace-nowrap uppercase text-[#5e574d]">CHCDB<span class="text-[#7c9082]">PRO</span></span>
            </div>
            <nav class="flex-1 px-4 space-y-4 pt-4">
                <button onclick="switchTab('dashboard')" class="nav-btn active" id="tab-dashboard"><i data-lucide="search"></i><span class="sidebar-text">Dashboard</span></button>
                <button onclick="switchTab('entry')" class="nav-btn" id="tab-entry"><i data-lucide="user-plus"></i><span class="sidebar-text">New Entry</span></button>
                <button onclick="switchTab('settings')" class="nav-btn" id="tab-settings"><i data-lucide="settings"></i><span class="sidebar-text">Settings</span></button>
            </nav>
            <div class="p-4 border-t border-[#f2ede4]">
                <button onclick="handleLogout()" class="nav-btn text-[#a67c7c] hover:bg-red-50"><i data-lucide="power"></i><span class="sidebar-text">Logout</span></button>
            </div>
        </aside>

        <!-- CONTENT VIEWPORT -->
        <main class="flex-1 flex flex-col bg-[#fcfaf5] relative overflow-hidden">
            
            <!-- VIEW: DASHBOARD (SEARCH STARTUP) -->
            <div id="view-dashboard" class="view-panel flex flex-col items-center justify-center p-6">
                <div class="w-full max-w-2xl text-center space-y-12">
                    <div class="space-y-2">
                        <h2 class="text-7xl font-black tracking-tighter uppercase text-[#e2d8c3]/40 select-none">Registry</h2>
                        <p class="text-[#7c9082] font-bold tracking-[0.6em] uppercase text-[10px]">Cloud Database Search</p>
                    </div>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 text-[#7c9082] w-6 h-6"></i>
                        <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search Name or Case ID..." class="w-full pl-16 pr-6 py-7 bg-white border-2 border-[#e2d8c3] rounded-[2.5rem] text-2xl text-[#4a443b] outline-none focus:border-[#7c9082] transition shadow-lg">
                    </div>
                    <div id="search-results" class="grid grid-cols-1 gap-3 text-left overflow-y-auto max-h-[40vh] custom-scroll pr-2"></div>
                </div>
            </div>

            <!-- VIEW: PATIENT ENTRY FORM -->
            <div id="view-entry" class="view-panel hidden overflow-y-auto p-4 lg:p-12 custom-scroll">
                <div class="max-w-5xl mx-auto bg-white rounded-[3rem] border border-[#e2d8c3] shadow-2xl" id="printable-record">
                    <div class="p-8 border-b border-[#f2ede4] flex justify-between items-center bg-[#f9f7f2] rounded-t-[3rem] no-print">
                        <h2 class="text-lg font-bold uppercase tracking-widest flex items-center gap-3 text-[#5e574d]">
                            <img src="logo.png" class="logo-sage w-6 h-6 object-contain" alt="Icon">
                            <span>Case Record</span>
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="exportToPDF()" class="p-3 bg-white border border-[#e2d8c3] rounded-2xl text-[#7c9082] hover:bg-[#fcfaf5] shadow-sm"><i data-lucide="download" class="w-5 h-5"></i></button>
                            <button onclick="window.print()" class="p-3 bg-white border border-[#e2d8c3] rounded-2xl text-[#7c9082] hover:bg-[#fcfaf5] shadow-sm"><i data-lucide="printer" class="w-5 h-5"></i></button>
                        </div>
                    </div>

                    <div class="p-8 lg:p-12 space-y-10">
                        <!-- Identity Section -->
                        <div class="flex flex-col md:flex-row gap-10">
                            <div class="flex-1 space-y-6">
                                <div class="field-box"><label>Case ID</label><input type="text" id="field-caseNumber" class="beige-input text-2xl font-bold text-[#7c9082] uppercase"></div>
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="field-box"><label>First Name</label><input type="text" id="field-name" class="beige-input"></div>
                                    <div class="field-box"><label>Middle Name</label><input type="text" id="field-middleName" class="beige-input"></div>
                                    <div class="field-box"><label>Surname</label><input type="text" id="field-surname" class="beige-input"></div>
                                </div>
                            </div>
                            <div class="w-full md:w-48 no-print flex flex-col justify-end">
                                <div class="relative h-48 w-full bg-[#fcfaf5] border-2 border-dashed border-[#dcd7c9] rounded-[2rem] flex flex-col items-center justify-center overflow-hidden hover:border-[#7c9082] transition group">
                                    <img id="photo-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                                    <div id="photo-placeholder" class="text-center text-[#dcd7c9]"><i data-lucide="camera" class="mx-auto mb-2 w-8 h-8"></i><span class="text-[10px] font-bold uppercase tracking-tighter">Photo</span></div>
                                    <input type="file" id="field-photo" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handlePhoto(this)">
                                </div>
                            </div>
                        </div>

                        <!-- Info Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-8 rounded-[2rem] bg-[#fcfaf5] border border-[#f2ede4]">
                            <div class="field-box md:col-span-2"><label>Address</label><input type="text" id="field-address" class="beige-input"></div>
                            <div class="field-box"><label>Bldg/Flat</label><input type="text" id="field-building" class="beige-input"></div>
                            <div class="field-box"><label>Road</label><input type="text" id="field-road" class="beige-input"></div>
                            <div class="field-box"><label>Area</label><input type="text" id="field-area" class="beige-input"></div>
                            <div class="field-box"><label>City</label><input type="text" id="field-city" class="beige-input"></div>
                            <div class="field-box"><label>State</label><input type="text" id="field-state" class="beige-input"></div>
                            <div class="field-box"><label>Pin Code</label><input type="text" id="field-pinCode" class="beige-input"></div>
                            <div class="field-box"><label>Mobile No</label><input type="text" id="field-mobile" class="beige-input"></div>
                            <div class="field-box"><label>Email</label><input type="email" id="field-email" class="beige-input"></div>
                            <div class="field-box"><label>Age</label><input type="number" id="field-age" class="beige-input"></div>
                            <div class="field-box"><label>DOB</label><input type="date" id="field-dob" class="beige-input"></div>
                            <div class="field-box"><label>Blood Group</label><select id="field-bloodGroup" class="beige-input"><option value="">-</option><option>A+</option><option>B+</option><option>O+</option><option>AB+</option><option>A-</option><option>B-</option><option>O-</option><option>AB-</option></select></div>
                        </div>

                        <!-- Symptom Table (Auto-Expanding) -->
                        <div class="space-y-6">
                            <div class="flex justify-between items-center px-4">
                                <h3 class="text-[10px] font-black text-[#8d7d66] uppercase tracking-[0.4em]">Clinical Case Logs</h3>
                                <button onclick="addSymptomRow()" class="no-print bg-[#7c9082] hover:bg-[#6b7e71] text-white text-[10px] font-bold px-6 py-2 rounded-xl">ADD ROW</button>
                            </div>
                            <div class="overflow-x-auto rounded-[2rem] border border-[#e2d8c3] bg-white">
                                <table class="w-full text-left text-sm border-collapse table-fixed">
                                    <thead class="bg-[#f9f7f2] text-[#8d7d66] text-[10px] uppercase border-b border-[#e2d8c3]">
                                        <tr><th class="px-6 py-4 w-44">Date</th><th>Symptoms</th><th>Remedy 1</th><th>Remedy 2</th><th class="w-16 no-print"></th></tr>
                                    </thead>
                                    <tbody id="symptom-body" class="divide-y divide-[#f2ede4]"></tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Footer Actions -->
                        <div class="flex flex-col md:flex-row gap-4 pt-10 no-print">
                            <button onclick="saveRecord()" class="flex-[2] bg-[#7c9082] text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-[#6b7e71] transition active:scale-[0.98] uppercase tracking-widest">Update Cloud Database</button>
                            <button id="delete-btn-form" onclick="deleteRecord(state.editingId)" class="hidden flex-1 bg-white text-red-400 border border-red-100 font-bold py-5 rounded-2xl hover:bg-red-50 transition uppercase text-[10px]">Delete Case</button>
                            <button onclick="resetForm()" class="flex-1 bg-[#f9f7f2] text-[#8d7d66] font-bold py-5 rounded-2xl uppercase text-[10px]">New Case</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: SETTINGS -->
            <div id="view-settings" class="view-panel hidden p-8 overflow-y-auto custom-scroll">
                <div class="max-w-xl mx-auto space-y-8 py-10">
                    <div class="bg-white p-10 rounded-[3rem] border border-[#e2d8c3] shadow-xl">
                        <h2 class="text-xl font-bold mb-6 text-[#5e574d] flex items-center gap-2"><i data-lucide="hash" class="text-[#7c9082]"></i> Case ID Config</h2>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="field-box"><label>Fixed Prefix</label><input type="text" id="set-prefix" class="beige-input" placeholder="e.g. CHC/"></div>
                            <div class="field-box"><label>Next Counter</label><input type="number" id="set-counter" class="beige-input" placeholder="1001"></div>
                        </div>
                        <button onclick="saveClinicSettings()" class="w-full bg-[#7c9082] text-white font-bold py-4 rounded-2xl uppercase shadow-lg">Save Config</button>
                    </div>
                    <div class="bg-white p-10 rounded-[3rem] border border-[#e2d8c3] shadow-xl text-center">
                        <h2 class="text-xl font-bold mb-6 text-[#5e574d]">Security</h2>
                        <input type="password" id="new-password" class="beige-input mb-4" placeholder="New Passcode">
                        <button onclick="updatePassword()" class="w-full bg-[#5e574d] text-white font-bold py-4 rounded-xl uppercase">Update</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
